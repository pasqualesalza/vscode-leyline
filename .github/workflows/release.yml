name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check-types
      - run: bun run compile
      - run: bun run lint
      - run: bun run test
      - run: xvfb-run -a bun run test:e2e

      - name: Detect pre-release
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag '$TAG' does not match semver format vMAJOR.MINOR.PATCH"
            exit 1
          fi
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "vsce_flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "vsce_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        id: release-notes
        uses: ffurrer2/extract-release-notes@v3

      - name: Package VSIX
        run: bunx @vscode/vsce package --no-dependencies ${{ steps.meta.outputs.vsce_flag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-notes.outputs.release_notes }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: "*.vsix"
